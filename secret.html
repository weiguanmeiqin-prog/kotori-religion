<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>内部</title>

<style>
body{
  background:#050505;
  color:white;
  text-align:center;
  font-family:serif;
}
.bird{
  font-size:60px;
  cursor:pointer;
}
</style>

</head>
<body>
<hr>
<div style="text-align: center; padding: 20px; background-color: #fff9e6; border-radius: 10px; margin: 20px;">
  <h2 style="color: #d4a017;">🐤 今日の小鳥の教え</h2>
  <p id="today-lesson" style="font-size: 1.2rem; font-weight: bold;">読み込み中...</p>
</div>

<script>
  // ここに教えを好きなだけ追加できます！
  const lessons = [
    "高く飛ぶより、低く安定して飛べ。",
    "折り目は心のしわ。丁寧に伸ばそう。",
    "種を食べ、空を仰ぎ、ただ折られよ。",
    "翼を休める勇気を持て。",
    "くちばしは災いの元、鳴き声は福の元。",
    "右の羽を折られたら、左の羽も差し出しなさい。",
    "迷ったときは、風の吹く方へ進め。"
  ];

  const today = new Date();
  // 日付（日）を使って、リストから一つ選びます
  const index = today.getDate() % lessons.length;
  document.getElementById("today-lesson").innerText = lessons[index];
</script>

<h1>ようこそ</h1>

<p id="rank"></p>

<div id="birds"></div>

<button onclick="goGod()">教祖に会う</button>

<script>

document.getElementById("rank").innerText =
"あなたの階級：" + localStorage.getItem("rank");

// 小鳥生成
function spawnBird(){
  const b = document.createElement("div");
  b.innerText="🕊";
  b.className="bird";

  b.onclick = ()=>{
    new Audio("https://www.soundjay.com/button/beep-07.wav").play();
    spawnBird();

    // ランクアップ
    if(Math.random() > 0.7){
      localStorage.setItem("rank","真の小鳥");
      rank.innerText="あなたの階級：真の小鳥";
    }
  };

  birds.appendChild(b);
}

spawnBird();

// 教え
const teachings = [
"折れ",
"もっと折れ",
"考えるな、折れ",
"紙がすべて"
];

setInterval(()=>{
  console.log(teachings[Math.floor(Math.random()*teachings.length)]);
},1000);

// 強制ログアウト
setTimeout(()=>{
  alert("時間切れ");
  location.href="index.html";
},60000);

function goGod(){
  location.href="god.html";
}

</script>

</body>
</html>
