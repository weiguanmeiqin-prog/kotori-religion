<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>内部</title>

<style>
body{
  background:#050505;
  color:white;
  text-align:center;
  font-family:serif;
}
.bird{
  font-size:60px;
  cursor:pointer;
}
</style>

</head>
<body>
<div style="text-align: center; padding: 20px; background-color: black;">
  <img src="logo.png" alt="折り紙の小鳥教ロゴ" style="width: 80%; max-width: 400px; height: auto;">
</div>

<hr>
<div style="text-align: center; padding: 20px; background-color: #fff9e6; border-radius: 10px; margin: 20px;">
  <h2 <h2 style="color: #0000ff;">🐤 今日の小鳥の教え</h2>
  <p id="today-lesson" style="font-size: 1.2rem; font-weight: bold; color: #00bfff;">読み込み中...</p>
</div>

<script>
  // ここに教えを好きなだけ追加できます！
  const lessons = [
    "高く飛ぶより、低く安定して飛べ。",
    "折り目は心のしわ。丁寧に伸ばそう。",
    "種を食べ、空を仰ぎ、ただ折られよ。",
    "翼を休める勇気を持て。",
    "くちばしは災いの元、鳴き声は福の元。",
    "右の羽を折られたら、左の羽も差し出しなさい。",
    "迷ったときは、風の吹く方へ進め。"
  ];

  const today = new Date();
  // 日付（日）を使って、リストから一つ選びます
  const index = today.getDate() % lessons.length;
  document.getElementById("today-lesson").innerText = lessons[index];
</script>

<h1>ようこそ</h1>

<p id="rank"></p>

<div id="birds"></div>

<button onclick="goGod()">教祖に会う</button>

<script>

document.getElementById("rank").innerText =
"あなたの階級：" + localStorage.getItem("rank");

// 小鳥生成
function spawnBird(){
  const b = document.createElement("div");
  b.innerText="🕊";
  b.className="bird";

  b.onclick = ()=>{
    new Audio("https://www.soundjay.com/button/beep-07.wav").play();
    spawnBird();

    // ランクアップ
    if(Math.random() > 0.7){
      localStorage.setItem("rank","真の小鳥");
      rank.innerText="あなたの階級：真の小鳥";
    }
  };

  birds.appendChild(b);
}

spawnBird();

// 教え
const teachings = [
"折れ",
"もっと折れ",
"考えるな、折れ",
"紙がすべて"
];

setInterval(()=>{
  console.log(teachings[Math.floor(Math.random()*teachings.length)]);
},1000);

// 強制ログアウト
setTimeout(()=>{
  alert("時間切れ");
  location.href="index.html";
},60000);

function goGod(){
  location.href="god.html";
}

</script>

</body>
<div style="text-align: center; padding: 20px; background-color: #1a1a1a; border: 2px dashed #00bfff; border-radius: 10px; margin: 20px; color: white; font-family: serif;">
  
  <h2 style="color: #ffeb3b;">✨ 今日のラッキー小鳥</h2>
  <p id="lucky-bird-new" style="font-size: 1.2rem;">調査中...</p>

  <hr style="border: 0.5px solid #333;">

  <button onclick="donateNew()" style="background: #d4a017; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
    お賽銭を投げる（徳を積む）
  </button>
  <p id="merit-msg-new" style="margin-top: 10px; color: #00ff00; height: 1.2em;"></p>

  <hr style="border: 0.5px solid #333;">

  <h3 style="color: #00bfff;">🌐 小鳥語翻訳機</h3>
  <input type="text" id="human-word-new" placeholder="ここに入力..." style="padding: 5px; width: 50%;">
  <button onclick="translateBirdNew()">翻訳</button>
  <p id="bird-result-new" style="margin-top: 10px; color: #00bfff; font-weight: bold;"></p>

</div>

<script>
  // ラッキー小鳥の設定
  const birdsList = ["青い小鳥", "金の小鳥", "伝説の巨大小鳥", "豆粒小鳥", "七色の小鳥"];
  document.getElementById("lucky-bird-new").innerText = "【" + birdsList[new Date().getDate() % birdsList.length] + "】";

  // お賽銭の仕組み
  let meritPoints = 0;
  function donateNew() {
    meritPoints += 100;
    const m = document.getElementById("merit-msg-new");
    if (meritPoints > 500) {
      m.innerText = "欲張りすぎです！小鳥がつつきに来ました。";
      m.style.color = "red";
    } else {
      m.innerText = "チャリーン！徳が " + meritPoints + " 上がった！";
    }
  }

  // 翻訳の仕組み
  function translateBirdNew() {
    const noises = ["ピピッ！", "チチッ！", "クルル…", "ピョッ？"];
    const input = document.getElementById("human-word-new").value;
    if(!input) return;
    let s = "";
    for(let i=0; i<3; i++) s += noises[Math.floor(Math.random()*noises.length)] + " ";
    document.getElementById("bird-result-new").innerText = "小鳥訳：「" + s.trim() + "」";
  }
</script>

</html>
