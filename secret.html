<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教祖の聖域</title>

<style>
body {
  background: #050505;
  color: white;
  text-align: center;
  font-family: "Hiragino Mincho ProN", serif;
  line-height: 1.6;
  margin: 0;
  padding-bottom: 50px;
}

.section {
  border: 1px solid #333;
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
}

button {
  background: #444;
  color: white;
  border: 1px solid #00bfff;
  padding: 10px 20px;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
  font-size: 1rem;
}

button:hover {
  background: #00bfff;
  color: black;
  box-shadow: 0 0 10px #00bfff;
}

#coins {
  font-size: 1.5em;
  color: #ffeb3b;
  font-weight: bold;
  margin: 10px 0;
}

.bird {
  font-size: 50px;
  cursor: pointer;
  display: inline-block;
  transition: 0.2s;
  user-select: none;
}

.bird:active {
  transform: scale(1.5);
}

input {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #00bfff;
  background: #222;
  color: white;
}
</style>
</head>

<body>

<!-- 上部 -->
<div style="padding: 20px; background: linear-gradient(to bottom, #111, #050505);">
  <img src="9F10F07F-1186-4DB5-B601-DFD33E2D96EA.png" style="width: 80%; max-width: 350px;">
  
  <p id="rank">階級：読み込み中...</p>
  <div id="coins">コイン：0</div>

  <button onclick="location.href='gacha.html'">🎰 ガチャ会場へ行く</button>
  <br><br>
  <button onclick="location.href='game.html'">🐤 ゲームで遊ぶ</button>
</div>

<!-- 今日の教え -->
<div class="section" style="background: #fff9e6; color: #333;">
  <h2>🐤 今日の小鳥の教え</h2>
  <p id="today-lesson"></p>
</div>

<!-- ログボ -->
<div class="section">
  <h3>🎁 毎日の修行（1日3回）</h3>
  <button id="login-btn">ログインしてコインをもらう</button>
</div>

<!-- 診断 -->
<button onclick="location.href='chaos.html'">🐤 カオス診断</button>

<!-- 徳 -->
<div class="section">
  <h2>✨ 徳を積む</h2>
  <button onclick="donateNew()">お賽銭</button>
  <p id="merit-msg-new"></p>

  <hr>

  <h3>🌐 小鳥語翻訳</h3>
  <input id="human-word-new">
  <button onclick="translateBirdNew()">翻訳</button>
  <p id="bird-result-new"></p>
</div>

<!-- 修行 -->
<div class="section">
  <h2>🙏 精神統一</h2>
  <div id="timer-display">30</div>
  <button onclick="startPray()">祈る</button>

  <div id="secret-area" style="display:none;">
    <p>✨ 悟りを開いた ✨</p>
    <button onclick="rainBirds()">🌈 神降臨</button>
  </div>
</div>

<!-- 小鳥 -->
<div id="birds-area"></div>

<script>

// =================
// 初期化
// =================
window.onload = () => {
  updateCoinDisplay();
  showLesson();
  document.getElementById("rank").innerText =
    "階級：" + (localStorage.getItem("rank") || "見習い");
  spawnBird();
};

// =================
// コイン
// =================
function updateCoinDisplay() {
  const c = localStorage.getItem("userCoins") || 0;
  document.getElementById("coins").innerText = "コイン：" + c;
}

// =================
// 教え
// =================
function showLesson() {
  const lessons = [
    "高く飛ぶな",
    "折れ",
    "風に従え",
    "休め",
    "鳴くな",
    "飛べ"
  ];
  document.getElementById("today-lesson").innerText =
    lessons[new Date().getDate() % lessons.length];
}

// =================
// ログボ
// =================
document.getElementById('login-btn').onclick = () => {
  let today = new Date().toLocaleDateString();
  let last = localStorage.getItem("loginDate");
  let count = Number(localStorage.getItem("loginCount") || 0);

  if(last !== today){
    count = 0;
    localStorage.setItem("loginDate", today);
  }

  if(count >= 3){
    alert("今日は終わり");
    return;
  }

  let c = Number(localStorage.getItem("userCoins") || 0) + 10;
  localStorage.setItem("userCoins", c);
  localStorage.setItem("loginCount", count + 1);

  updateCoinDisplay();
};

// =================
// 徳
// =================
let merit = 0;
function donateNew(){
  merit += 100;
  document.getElementById("merit-msg-new").innerText =
    "徳 +" + merit;
}

// =================
// 翻訳
// =================
function translateBirdNew(){
  document.getElementById("bird-result-new").innerText =
    "ピピッ！チチッ！";
}

// =================
// 修行
// =================
function startPray(){
  let t = 30;
  let timer = setInterval(()=>{
    t--;
    document.getElementById("timer-display").innerText = t;
    if(t<=0){
      clearInterval(timer);
      document.getElementById("secret-area").style.display="block";
    }
  },1000);
}

// =================
// 神降臨
// =================
function rainBirds(){
  for(let i=0;i<20;i++){
    let b=document.createElement("div");
    b.innerText="🐤";
    b.style.position="fixed";
    b.style.left=Math.random()*100+"%";
    b.style.top="-50px";
    document.body.appendChild(b);

    setTimeout(()=>{
      b.style.top="100%";
    },100);

    setTimeout(()=>b.remove(),3000);
  }
}

// =================
// 小鳥
// =================
function spawnBird(){
  let b=document.createElement("div");
  b.innerText="🕊";
  b.className="bird";

  b.onclick=()=>{
    spawnBird();
    if(Math.random()>0.8){
      localStorage.setItem("rank","真の小鳥");
    }
  };

  document.getElementById("birds-area").appendChild(b);
}

</script>

</body>
</html>
