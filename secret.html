<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教祖の聖域</title>
<style>
  body { background: #050505; color: white; text-align: center; font-family: "Hiragino Mincho ProN", serif; line-height: 1.6; margin: 0; padding-bottom: 50px; }
  .section { border: 1px solid #333; margin: 20px; padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.05); }
  button { background: #444; color: white; border: 1px solid #00bfff; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
  button:hover { background: #00bfff; color: black; box-shadow: 0 0 10px #00bfff; }
  #coins { font-size: 1.5em; color: #ffeb3b; font-weight: bold; margin: 10px 0; }
  .bird { font-size: 50px; cursor: pointer; display: inline-block; transition: 0.2s; user-select: none; }
  .bird:active { transform: scale(1.5); }
  input { padding: 8px; border-radius: 5px; border: 1px solid #00bfff; background: #222; color: white; }
</style>
</head>
<body>
  <div style="padding: 20px; background: linear-gradient(to bottom, #111, #050505);">
    <img src="9F10F07F-1186-4DB5-B601-DFD33E2D96EA.png" alt="教団ロゴ" style="width: 80%; max-width: 350px; display: block; margin: 0 auto;">
    <p id="rank" style="color: #00bfff; font-weight: bold; margin-top: 10px;">階級：読み込み中...</p>
    <div id="coins">コイン：0</div>
    <button onclick="location.href='gacha.html'" style="background: #d4af37; color: black; border: none; font-weight: bold; padding: 15px 30px; font-size: 1.2rem; border-radius: 50px;">🎰 ガチャ会場へ行く</button>
  </div>

  <div class="section" style="background: #fff9e6; color: #333;">
    <h2 style="color: #0000ff; margin: 0;">🐤 今日の小鳥の教え</h2>
    <p id="today-lesson" style="font-size: 1.2rem; font-weight: bold; color: #00bfff;">心の中で紙を折りなさい...</p>
  </div>

  <div class="section">
    <h3>🎁 毎日の修行（1日3回まで）</h3>
    <button id="login-btn">ログインして徳（コイン）をもらう</button>
  </div>
<button onclick="goTest()">🐤 カオス診断を始める</button>
<br><br>
<button onclick="location.href='game.html'">🐤 ゲームで遊ぶ</button>
 <div class="card" style="border-color: cyan; background: rgba(0, 255, 255, 0.05);">
    <h3 style="color: cyan; margin-top: 0;">📜 外伝：千羽鶴の祈り</h3>
    <p style="font-size: 12px; color: #aaa;">2xxx年、失われた日本を巡る旅へ</p>
  
</div>  
  <script>
function goTest(){
  window.location.href = "chaos.html"; // ←ここにファイル名
}
</script>
  <div class="section" style="border-style: dashed; border-color: #00bfff;">
    <h2 style="color: #ffeb3b;">✨ 徳を積む場所</h2>
    <button onclick="donateNew()">お賽銭を投げる（チャリーン）</button>
    <p id="merit-msg-new" style="color: #00ff00; font-weight: bold; height: 1.5em;"></p>
    <hr style="border: 0.5px solid #333; margin: 20px 0;">
    <h3>🌐 小鳥語翻訳機</h3>
    <input type="text" id="human-word-new" placeholder="伝えたい言葉を入力...">
    <button onclick="translateBirdNew()">翻訳</button>
    <p id="bird-result-new" style="color: #00bfff; font-weight: bold; margin-top: 15px;"></p>
  </div>

  <div class="section" style="background: linear-gradient(to bottom, #1a1a1a, #000);">
    <h2>🙏 精神統一の刻</h2>
    <p>30秒間、心を無にして見つめなさい。</p>
    <div id="timer-display" style="font-size: 3rem; color: #ffeb3b; font-weight: bold; margin: 10px 0;">30</div>
    <button id="pray-btn" onclick="startPray()">祈りを捧げる</button>
    
    <div id="secret-area" style="display: none; margin-top: 20px; padding: 15px; border: 2px double #ffeb3b; background: rgba(255, 235, 59, 0.1);">
      <p style="color: #ffeb3b; font-weight: bold; font-size: 1.2rem;">✨ 悟りを開きました ✨</p>
      <p>「折らぬ勇気も、また折り紙なり」</p>
      <button onclick="rainBirds()" style="background: #00bfff; color: black; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer;">🌈 神を降臨させる</button>
    </div>
  </div>

  <div id="birds-area" style="min-height: 120px; padding: 20px;">
    <p style="color: #555; font-size: 0.8rem;">↓ 画面をタップして小鳥を呼び出す ↓</p>
  </div>

  <div style="margin-top: 30px;">
    <button onclick="location.href='god.html'" style="background: linear-gradient(45deg, #d4af37, #f9f1c0); color: #1a1a1a; border: none; padding: 15px 40px; font-weight: bold; font-size: 1.2rem; border-radius: 50px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);">
      ⛩️ 聖域を再読み込みする
    </button>
  </div>

<script>
  // --- データの読み込みと初期表示 ---
  window.onload = () => {
    updateCoinDisplay();
    showLesson();
    document.getElementById("rank").innerText = "あなたの階級：" + (localStorage.getItem("rank") || "見習い折り師");
    spawnBird();
  };

  // コイン表示を最新にする
  function updateCoinDisplay() {
    const c = localStorage.getItem("userCoins") || 0;
    document.getElementById("coins").innerText = "コイン：" + c;
  }

  // 今日の教えを表示
  function showLesson() {
    const lessons = [
      "高く飛ぶより、低く安定して飛べ。",
      "折り目は心のしわ。丁寧に伸ばそう。",
      "種を食べ、空を仰ぎ、ただ折られよ。",
      "翼を休める勇気を持て。",
      "くちばしは災いの元、鳴き声は福の元。",
      "風の吹く方へ進め。"
    ];
    const idx = new Date().getDate() % lessons.length;
    document.getElementById("today-lesson").innerText = lessons[idx];
  }

  // ログインボーナス処理
  document.getElementById('login-btn').addEventListener('click', () => {
    let today = new Date().toLocaleDateString();
    let lastDate = localStorage.getItem("loginDate");
    let count = Number(localStorage.getItem("loginCount") || 0);

    if (lastDate !== today) {
      localStorage.setItem("loginDate", today);
      localStorage.setItem("loginCount", 0);
      count = 0;
    }

    if (count >= 3) {
      alert("今日はもう十分修行しました。また明日来なさい。");
      return;
    }

    let c = Number(localStorage.getItem("userCoins") || 0) + 10;
    localStorage.setItem("userCoins", c);
    localStorage.setItem("loginCount", count + 1);
    
    updateCoinDisplay();
    alert("ログインボーナス！10コインを授けました。");
  });

  // お賽銭
  let merit = 0;
  function donateNew() {
    merit += 100;
    const m = document.getElementById("merit-msg-new");
    if (merit > 500) {
      m.innerText = "欲張りすぎです！小鳥がつつきに来ますよ。";
      m.style.color = "red";
    } else {
      m.innerText = "チャリーン！徳が " + merit + " 上がった！";
      m.style.color = "#00ff00";
    }
  }

  // 翻訳
  function translateBirdNew() {
    const noises = ["ピピッ！", "チチッ！", "クルル…", "ピョッ？", "クワッ！"];
    const input = document.getElementById("human-word-new").value;
    if(!input) return;
    let s = "";
    for(let i=0; i<3; i++) s += noises[Math.floor(Math.random()*noises.length)] + " ";
    document.getElementById("bird-result-new").innerText = "小鳥訳：「" + s.trim() + "」";
  }

  // 精神統一タイマー
  function startPray() {
    let time = 30;
    const btn = document.getElementById('pray-btn');
    btn.disabled = true;
    btn.innerText = "祈祷中...";
    
    const timer = setInterval(() => {
      time--;
      document.getElementById('timer-display').innerText = time;
      if (time <= 0) {
        clearInterval(timer);
        document.getElementById('timer-display').style.display = 'none';
        document.getElementById('secret-area').style.display = 'block';
      }
    }, 1000);
  }

  // 神降臨（小鳥を降らせる）
  function rainBirds() {
    for(let i=0; i<40; i++) {
      setTimeout(() => {
        const b = document.createElement('div');
        b.innerText = '🐤';
        b.style.cssText = `position:fixed; top:-50px; left:${Math.random()*100}vw; font-size:30px; z-index:9999; pointer-events:none; transition:3s linear;`;
        document.body.appendChild(b);
        setTimeout(() => { 
          b.style.transform = `translateY(${window.innerHeight+100}px) rotate(720deg)`; 
          b.style.opacity = '0'; 
        }, 100);
        setTimeout(() => b.remove(), 3500);
      }, i * 120);
    }
  }

  // 小鳥を増やす
  function spawnBird() {
    const b = document.createElement("div");
    b.innerText="🕊"; 
    b.className="bird";
    b.onclick = () => { 
      spawnBird(); 
      if(Math.random() > 0.85) { 
        localStorage.setItem("rank","真の小鳥"); 
        document.getElementById("rank").innerText = "あなたの階級：真の小鳥";
      } 
    };
    document.getElementById("birds-area").appendChild(b);
  }
</script>

</body>
</html>
