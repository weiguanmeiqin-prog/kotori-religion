<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>内部</title>

<style>
body{
  background:#050505;
  color:white;
  text-align:center;
  font-family:serif;
}
.bird{
  font-size:60px;
  cursor:pointer;
}
</style>

</head>
<body>

<h1>ようこそ</h1>

<p id="rank"></p>

<div id="birds"></div>

<button onclick="goGod()">教祖に会う</button>

<script>

document.getElementById("rank").innerText =
"あなたの階級：" + localStorage.getItem("rank");

// 小鳥生成
function spawnBird(){
  const b = document.createElement("div");
  b.innerText="🕊";
  b.className="bird";

  b.onclick = ()=>{
    new Audio("https://www.soundjay.com/button/beep-07.wav").play();
    spawnBird();

    // ランクアップ
    if(Math.random() > 0.7){
      localStorage.setItem("rank","真の小鳥");
      rank.innerText="あなたの階級：真の小鳥";
    }
  };

  birds.appendChild(b);
}

spawnBird();

// 教え
const teachings = [
"折れ",
"もっと折れ",
"考えるな、折れ",
"紙がすべて"
];

setInterval(()=>{
  console.log(teachings[Math.floor(Math.random()*teachings.length)]);
},1000);

// 強制ログアウト
setTimeout(()=>{
  alert("時間切れ");
  location.href="index.html";
},60000);

function goGod(){
  location.href="god.html";
}

</script>

</body>
</html>
