<script>
  // ラッキー小鳥の設定
  const birdsList = ["青い小鳥", "金の小鳥", "伝説の巨大小鳥", "豆粒小鳥", "七色の小鳥"];
  document.getElementById("lucky-bird-new").innerText = "【" + birdsList[new Date().getDate() % birdsList.length] + "】";

  // お賽銭の仕組み
  let meritPoints = 0;
  function donateNew() {
    meritPoints += 100;
    const m = document.getElementById("merit-msg-new");
    if (meritPoints > 500) {
      m.innerText = "欲張りすぎです！小鳥がつつきに来ました。";
      m.style.color = "red";
    } else {
      m.innerText = "チャリーン！徳が " + meritPoints + " 上がった！";
    }
  }

  // 翻訳の仕組み
  function translateBirdNew() {
    const noises = ["ピピッ！", "チチッ！", "クルル…", "ピョッ？"];
    const input = document.getElementById("human-word-new").value;
    if(!input) return;
    let s = "";
    for(let i=0; i<3; i++) s += noises[Math.floor(Math.random()*noises.length)] + " ";
    document.getElementById("bird-result-new").innerText = "小鳥訳：「" + s.trim() + "」";
  }
</script>

<script>
  // --- 4. 祈りのタイマー機能 ---
  let timeLeft = 30;
  let timerId = null;

  function startPray() {
    const btn = document.getElementById('pray-btn');
    if (timerId) return; // 二重押し防止

    btn.disabled = true;
    btn.innerText = "祈祷中...";
    document.getElementById('timer-status').innerText = "動いてはならぬ。画面をじっと見つめるのです。";

    timerId = setInterval(() => {
      timeLeft--;
      document.getElementById('timer-display').innerText = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(timerId);
        document.getElementById('timer-display').style.display = 'none';
        document.getElementById('timer-status').innerText = "よく耐えました。";
        document.getElementById('secret-area').style.display = 'block';
      }
    }, 1000);
  }

  // --- 2. 小鳥降臨（エフェクト）機能 ---
  function rainBirds() {
    for (let i = 0; i < 50; i++) {
      setTimeout(() => {
        const bird = document.createElement('div');
        bird.innerText = '🐤'; // 絵文字の小鳥
        bird.style.position = 'fixed';
        bird.style.top = '-50px';
        bird.style.left = Math.random() * 100 + 'vw';
        bird.style.fontSize = (Math.random() * 20 + 20) + 'px';
        bird.style.zIndex = '9999';
        bird.style.pointerEvents = 'none'; // クリックの邪魔をしない
        bird.style.transition = 'transform ' + (Math.random() * 2 + 2) + 's linear, opacity 2s';
        
        document.body.appendChild(bird);

        // アニメーション（下に落とす）
        setTimeout(() => {
          bird.style.transform = 'translateY(' + (window.innerHeight + 100) + 'px) rotate(' + (Math.random() * 360) + 'deg)';
          bird.style.opacity = '0';
        }, 100);

        // 使い終わった要素を消す
        setTimeout(() => bird.remove(), 4000);
      }, i * 100); // 0.1秒おきに1羽ずつ降らす
    }
  }

function enableShake(){
  if (typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(response => {
        if (response === 'granted') {
          startShake();
        }
      });
  } else {
    startShake();
  }
}

function startShake(){
  let last = 0;
  window.addEventListener("devicemotion", (e)=>{
    const acc = e.accelerationIncludingGravity;
    if(!acc) return;

    const total =
      Math.abs(acc.x || 0) +
      Math.abs(acc.y || 0) +
      Math.abs(acc.z || 0);

    if(total > 90 && Date.now() - last > 5500){
      last = Date.now();
      ritual();
    }
  });
}

// --- 379行目付近から書き換え ---
function gacha() {
  // お財布（userCoins）から今の枚数を読み込む
  let coins = Number(localStorage.getItem("userCoins") || 0);
  let count = Number(localStorage.getItem("gachaCount") || 0);

  // 10枚あるかチェック
  if (coins < 10) {
    alert("コインが足りないよ！（10枚必要です）");
    return;
  }

  // 1日3回制限チェック
  if (count >= 3) {
    alert("今日はもう引けない！また明日修行に励みなさい。");
    return;
  }

  // --- ガチャ実行（コインを減らして保存） ---
  coins -= 10;
  count += 1;
  localStorage.setItem("userCoins", coins);
  localStorage.setItem("gachaCount", count);

  // 画面の表示を全部更新する
  if(document.getElementById("coins")) {
    document.getElementById("coins").innerText = "コイン：" + coins;
  }
  if(document.getElementById("coin-count")) {
    document.getElementById("coin-count").innerText = coins;
  
  
  // 確率計算
  let totalRate = characters.reduce((sum, c) => sum + c.rate, 0);
  let rand = Math.random() * totalRate;

  let selected;
  for(let c of characters){
    rand -= c.rate;
    if(rand <= 0){
      selected = c;
      break;
    }
  }

  // コレクション保存
  let collection = JSON.parse(localStorage.getItem("collection") || "[]");
  collection.push(selected);
  localStorage.setItem("collection", JSON.stringify(collection));

  // 表示
  document.getElementById("result").innerHTML =
    "<h2>" + selected.name + "</h2>" +
    "<img src='" + selected.img + "' width='150'>";

  // コイン表示更新
  document.getElementById("coins").innerText =
    "コイン：" + coins;
}
