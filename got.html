<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐤 小鳥教：聖なる宝物庫</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        body { background: black; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        h1 { color: gold; border-bottom: 2px solid gold; padding: 20px; margin: 0; }
        .item-list { padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding-bottom: 100px; }
        .item-card { 
            background: #111; border: 1px solid #444; border-radius: 10px; 
            padding: 15px; width: 140px; color: #ccc; font-size: 13px; position: relative;
        }
        .ssr { border: 2px solid cyan; box-shadow: 0 0 15px cyan; color: white; font-weight: bold; animation: shine 2s infinite linear; }
        .sr { border: 2px solid #c0c0c0; color: #fff; }
        .r { border: 1px solid #cd7f32; color: #ffa500; }
        .bonus-tag { font-size: 10px; color: lime; display: block; margin-top: 5px; }
        @keyframes shine { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        .back-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 15px 30px; background: gold; color: black; border-radius: 50px; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <h1>📜 聖なる宝物庫</h1>
    <div id="status" style="margin-top:20px;">あなたの功績を確認中...</div>
    <div id="set-bonus" style="color:cyan; font-weight:bold; margin:10px;"></div>
    <div class="item-list" id="item-list"></div>
    <a href="game.html" class="back-btn">聖戦へ戻る</a>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCJX2ggw5ZlDzdkK8YjsuEneVi9etA3mQ4",
            authDomain: "bird-battle-online.firebaseapp.com",
            databaseURL: "https://bird-battle-online-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bird-battle-online",
            storageBucket: "bird-battle-online.firebasestorage.app",
            messagingSenderId: "801450921560",
            appId: "1:801450921560:web:a6b3b4993945f97f73c42d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                database.ref('users/' + user.uid + '/items').on('value', snap => {
                    const listDiv = document.getElementById('item-list');
                    listDiv.innerHTML = "";
                    const data = snap.val();
                    if (!data) { document.getElementById('status').innerText = "まだ宝物はありません"; return; }
                    
                    document.getElementById('status').innerText = "所持アイテム一覧（重複は力なり）";
                    let counts = {};
                    Object.values(data).forEach(item => { counts[item.name] = (counts[item.name] || 0) + 1; });

                    Object.keys(counts).forEach(name => {
                        const card = document.createElement('div');
                        let rarity = name.includes("SSR") ? "ssr" : (name.includes("SR") ? "sr" : (name.includes("R") ? "r" : "n"));
                        card.className = `item-card ${rarity}`;
                        let num = counts[name] > 1 ? `<span style="color:gold;"> x${counts[name]}</span>` : "";
                        card.innerHTML = `${name}${num}<span class="bonus-tag">限界突破中</span>`;
                        listDiv.appendChild(card);
                    });

                    if (counts["SSR：黄金の教祖像"] && counts["SSR：古の教典原書"]) {
                        document.getElementById('set-bonus').innerText = "✨ 【セット発動】伝説の師弟：ATK +50% ✨";
                    }
                });
            }
        });
    </script>
</body>
</html>
