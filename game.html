<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐤 小鳥教：メガモン聖戦</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body{ background:black; color:white; text-align:center; font-family:sans-serif; margin:0; }
        .bar{ width:250px; height:30px; background:#333; margin:20px auto; border:2px solid gold; border-radius:15px; overflow:hidden; }
        .hp{ height:100%; background:red; width:100%; transition: width 0.3s; }
        button{ padding:20px 40px; font-size:20px; border-radius:50px; background:gold; color:black; border:none; font-weight:bold; box-shadow: 0 5px #b8860b; }
        button:active{ transform:translateY(3px); box-shadow: 0 2px #b8860b; }
        #log{ height:150px; overflow-y:auto; background:rgba(255,215,0,0.1); margin:20px; padding:10px; font-size:14px; color:gold; border-radius:10px; }
        
        #waiting-area { padding: 50px; }
        .timer-box { font-size: 30px; color: gold; border: 1px solid gold; padding: 10px; display: inline-block; margin-top: 10px; }
        .alert-flash { background: red; color: white; padding: 10px; font-weight: bold; animation: blink 0.5s infinite; display: none; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="notification" class="alert-flash">🚨 決戦開始！偽教祖を包囲せよ！！ 🚨</div>

    <h1>🐤 小鳥教：メガモン聖戦</h1>

    <div id="waiting-area">
        <h2 id="wait-status">次なる神託を待機中...</h2>
        <div id="countdown-area" style="display:none;">
            <p style="color:red; font-weight:bold;">【偽教祖 降臨予告】</p>
            <div id="target-time" style="font-size: 18px; color: gold; margin-bottom: 5px;"></div>
            <div class="timer-box">降臨まで: <span id="timer-text">--:--</span></div>
        </div>
    </div>

    <div id="battle-area" style="display:none;">
        <h2 id="eName" style="color:red;">🔥 偽教祖 🔥</h2>
        <div class="bar"><div id="eBar" class="hp"></div></div>
        <h3 id="eHPText">Loading...</h3>
        <button onclick="attack()">聖なる突撃！！</button>
    </div>

    <div id="log">教典を接続中...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCJX2ggw5ZlDzdkK8YjsuEneVi9etA3mQ4",
            authDomain: "bird-battle-online.firebaseapp.com",
            databaseURL: "https://bird-battle-online-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bird-battle-online",
            storageBucket: "bird-battle-online.firebasestorage.app",
            messagingSenderId: "801450921560",
            appId: "1:801450921560:web:a6b3b4993945f97f73c42d",
            measurementId: "G-4MXK6ZZVNK"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const hpRef = database.ref('enemyHP');
        const eventRef = database.ref('eventData');

        let nextSpawnTime = 0;
        let isFighting = false;

        // データの監視
        eventRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.spawnTime) {
                nextSpawnTime = data.spawnTime;
                const date = new Date(nextSpawnTime);
                document.getElementById('target-time').innerText = `降臨予定：${date.getHours()}時${date.getMinutes()}分`;
                document.getElementById('countdown-area').style.display = 'block';
                document.getElementById('wait-status').innerText = "偽教祖、降臨の兆しあり。";
            } else {
                // 時間が決まっていない場合は、誰かが代表してランダムに決める
                setRandomSpawn();
            }
        });

        // 1秒ごとにカウントダウン
        setInterval(() => {
            if (nextSpawnTime === 0 || isFighting) return;
            const now = Date.now();
            const diff = nextSpawnTime - now;

            if (diff <= 0) {
                startBattle();
            } else {
                const min = Math.floor(diff / 60000);
                const sec = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-text').innerText = `${min}分${sec}秒`;
            }
        }, 1000);

        // --- 🧪 教祖の采配：ランダム出現時間をFirebaseにセット ---
        function setRandomSpawn() {
            // 他の人が同時にセットしないよう、既にセットされていたら何もしない
            eventRef.transaction((currentData) => {
                if (currentData) return; // 既に誰かが決めた

                // 【設定】1分後〜5分後の間でランダムに決める（ここを好きな時間に変えてね）
                const waitMin = 1 * 60 * 1000;
                const waitMax = 5 * 60 * 1000;
                const randomWait = Math.floor(Math.random() * (waitMax - waitMin)) + waitMin;
                
                return { spawnTime: Date.now() + randomWait };
            });
        }

        function startBattle() {
            if(isFighting) return;
            isFighting = true;
            document.getElementById('waiting-area').style.display = 'none';
            document.getElementById('battle-area').style.display = 'block';
            document.getElementById('notification').style.display = 'block';
            hpRef.set(1000); 
            log("🚨 降臨時刻！メガ偽教祖が現れた！");
        }

        hpRef.on('value', (snapshot) => {
            let hp = snapshot.val();
            updateDisplay(hp || 0);
            if (hp <= 0 && isFighting) {
                finishBattle();
            }
        });

        function attack() {
            if (!isFighting) return;
            hpRef.transaction((currentHP) => {
                let dmg = Math.floor(Math.random() * 20) + 10;
                return (currentHP || 1000) - dmg;
            });
        }

        function finishBattle() {
            isFighting = false;
            document.getElementById('waiting-area').style.display = 'block';
            document.getElementById('battle-area').style.display = 'none';
            document.getElementById('notification').style.display = 'none';
            document.getElementById('countdown-area').style.display = 'none';
            document.getElementById('wait-status').innerText = "偽教祖は浄化されました。";
            log("🎊 討伐完了！平和が訪れた。");
            
            // 倒したらFirebaseの時間を空にする（すると自動で次の抽選が始まる）
            eventRef.set(null);
        }

        function updateDisplay(hp) {
            document.getElementById("eBar").style.width = (hp / 1000) * 100 + "%";
            document.getElementById("eHPText").innerText = hp + " / 1000";
        }

        function log(t) {
            let l = document.getElementById("log");
            l.innerHTML = `<div>${t}</div>` + l.innerHTML;
        }
    </script>
</body>
</html>
