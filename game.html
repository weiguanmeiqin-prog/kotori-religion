<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐤 小鳥教RPG：聖戦</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{ background:black; color:white; text-align:center; font-family:sans-serif; margin:0; overflow-x:hidden; }
button{ padding:12px; margin:5px; font-size:16px; border-radius:10px; cursor:pointer; background:#444; color:gold; border:1px solid gold; }
button:active{ transform:scale(0.95); }
.bar{ width:200px; height:20px; background:#333; margin:10px auto; border:1px solid #555; }
.hp{ height:100%; background:lime; transition: width 0.3s; }
#log{ margin-top:10px; color:#ffd700; height:100px; overflow-y:auto; text-align:left; padding:10px; background:rgba(255,255,255,0.1); font-size:12px; }
#coin-display { color: gold; font-weight: bold; font-size: 1.2rem; }
.effect-bird { position: fixed; font-size: 40px; pointer-events: none; z-index: 999; animation: fadeout 1s forwards; }
@keyframes fadeout { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-50px); } }
</style>
</head>

<body>

<h1>🐤 小鳥教：共闘聖戦</h1>
<div id="coin-display"></div>
<div id="main"></div>
<div id="log"></div>

<script>
// ===================
// 🌐 サーバー接続
// ===================
const socket = io();

// ===================
// 💰 コイン・データ
// ===================
let coin = Number(localStorage.getItem("coin") || 100);
let owned = JSON.parse(localStorage.getItem("birds") || "[]");
let selectedIndex = (owned.length > 0) ? 0 : null;

function updateCoin(){
    document.getElementById("coin-display").innerText = "所持コイン: " + coin;
    localStorage.setItem("coin", coin);
}

// ===================
// 🐤 ガチャデータ
// ===================
const birds = [
    {name:"🐤 ノーマル", power:10, maxHp:100}, {name:"🪶 スピード", power:12, maxHp:90},
    {name:"🌿 森", power:15, maxHp:120}, {name:"🔥 炎", power:18, maxHp:110},
    {name:"💀 闇", power:20, maxHp:100}, {name:"🌀 カオス", power:22, maxHp:95},
    {name:"👑 教祖", power:25, maxHp:130}, {name:"✨ 神官", power:27, maxHp:120},
    {name:"🌌 宇宙", power:30, maxHp:140}, {name:"⚡ バグ", power:35, maxHp:80}
];

function gacha(){
    if(coin < 10){ alert("コインが足りません！"); return; }
    coin -= 10;
    let r = JSON.parse(JSON.stringify(birds[Math.floor(Math.random()*birds.length)]));
    r.level = 1; r.exp = 0;
    owned.push(r);
    localStorage.setItem("birds", JSON.stringify(owned));
    updateCoin();
    document.getElementById("main").innerHTML = `<h2>${r.name} 獲得!!</h2><button onclick="showMenu()">戻る</button>`;
}

// ===================
// ⚔️ バトルロジック
// ===================
let player, enemy, turnLock = false;
const enemies = [{name:"🌀 カオスの塊", maxHp:500}, {name:"👑 偽教祖", maxHp:1000}]; // 共闘用にHP高め

function startBattle(){
    if(selectedIndex === null){ alert("小鳥を選んでください！"); return; }
    player = JSON.parse(JSON.stringify(owned[selectedIndex]));
    enemy = JSON.parse(JSON.stringify(enemies[Math.floor(Math.random()*enemies.length)]));
    player.hp = player.maxHp; enemy.hp = enemy.maxHp;
    drawBattle();
}

function drawBattle(){
    document.getElementById("main").innerHTML = `
        <h3>【自軍】${player.name} Lv${player.level}</h3>
        <div class="bar"><div id="pBar" class="hp"></div></div>
        <p id="pText"></p>
        <h2>VS ${enemy.name}</h2>
        <div class="bar"><div id="eBar" class="hp" style="background:red;"></div></div>
        <p id="eText"></p>
        <button onclick="attack()">聖なる攻撃</button>
        <button onclick="heal()">回復</button>
    `;
    updateHP();
}

function updateHP(){
    document.getElementById("pBar").style.width = (player.hp/player.maxHp)*100 + "%";
    document.getElementById("eBar").style.width = (enemy.hp/enemy.maxHp)*100 + "%";
    document.getElementById("pText").innerText = `${player.hp}/${player.maxHp}`;
    document.getElementById("eText").innerText = `${enemy.hp}/${enemy.maxHp}`;
}

function attack(){
    if(turnLock || enemy.hp <= 0) return;
    let dmg = Math.floor(Math.random()*10) + player.power;
    
    // 💥 サーバーに攻撃を送る！
    socket.emit('send-attack', { sender: player.name, damage: dmg });
    
    turnLock = true;
    setTimeout(() => { if(enemy.hp > 0) enemyTurn(); else win(); }, 800);
}

// 🌐 サーバーから届く「みんなの攻撃」
socket.on('receive-attack', (data) => {
    enemy.hp -= data.damage;
    if(enemy.hp < 0) enemy.hp = 0;
    updateHP();
    log(`🔥 [${data.sender}] の追撃！ ${data.damage}ダメ！`);
    
    // 小鳥を画面に飛ばす演出
    let b = document.createElement("div");
    b.className = "effect-bird"; b.innerText = "🐤";
    b.style.left = Math.random()*80 + 10 + "%"; b.style.top = "50%";
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 1000);
});

function enemyTurn(){
    let dmg = 10;
    player.hp -= dmg;
    log(`💀 敵の反撃：${dmg}ダメージ`);
    updateHP();
    if(player.hp <= 0) lose();
    else turnLock = false;
}

function heal(){
    player.hp = Math.min(player.maxHp, player.hp + 20);
    log("✨ 回復した！");
    updateHP();
    setTimeout(enemyTurn, 800);
}

function win(){
    coin += 50; updateCoin();
    document.getElementById("main").innerHTML = `<h2>大勝利！！</h2><button onclick="showMenu()">戻る</button>`;
}

function lose(){
    document.getElementById("main").innerHTML = `<h2>敗北…</h2><button onclick="showMenu()">戻る</button>`;
}

function log(t){
    let l = document.getElementById("log");
    l.innerHTML = `<div>${t}</div>` + l.innerHTML;
}

function showMenu(){
    document.getElementById("main").innerHTML = `
        <button onclick="gacha()">🎰 ガチャ (10枚)</button><br>
        <button onclick="startBattle()">⚔ 聖戦開始</button><br>
        <button onclick="showOwned()">📦 所持小鳥</button>
    `;
}

function showOwned(){
    let html = "<h3>選んでください</h3>";
    owned.forEach((b,i) => {
        html += `<button onclick="selectedIndex=${i};showMenu()">${b.name} Lv${b.level}</button><br>`;
    });
    document.getElementById("main").innerHTML = html;
}

updateCoin(); showMenu();
</script>
</body>
</html>
