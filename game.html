<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐤 小鳥教：Firebase聖戦</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body{ background:black; color:white; text-align:center; font-family:sans-serif; margin:0; }
        .bar{ width:250px; height:30px; background:#333; margin:20px auto; border:2px solid gold; border-radius:15px; overflow:hidden; }
        .hp{ height:100%; background:red; width:100%; transition: width 0.3s; }
        button{ padding:20px 40px; font-size:20px; border-radius:50px; background:gold; color:black; border:none; font-weight:bold; }
        #log{ height:150px; overflow-y:auto; background:rgba(255,215,0,0.1); margin:20px; padding:10px; font-size:14px; color:gold; }
    </style>
</head>
<body>
    <h1>🐤 Firebase共闘聖戦</h1>
    <div class="bar"><div id="eBar" class="hp"></div></div>
    <h3 id="eHPText">1000 / 1000</h3>
    <button onclick="attack()">聖なる突撃！！</button>
    <div id="log">ログ待機中...</div>

    <script>
        // 【ここを書き換えて！】Firebaseの画面に出ている config をそのまま貼る
        const firebaseConfig = {
            apiKey: "あなたのAPIキー",
            authDomain: "あなたのドメイン",
            databaseURL: "あなたのデータベースURL",
            projectId: "あなたのプロジェクトID",
            storageBucket: "あなたのバケット",
            messagingSenderId: "あなたのID",
            appId: "あなたのAPP ID"
        };

        // Firebase初期化
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const hpRef = database.ref('enemyHP');

        // データの初期化（もしデータがなければ1000にする）
        hpRef.on('value', (snapshot) => {
            let hp = snapshot.val();
            if (hp === null) {
                hp = 1000;
                hpRef.set(1000);
            }
            updateDisplay(hp);
        });

        function attack() {
            hpRef.transaction((currentHP) => {
                let dmg = Math.floor(Math.random() * 20) + 10;
                log(`🔥 あなたが ${dmg}ダメ！`);
                return (currentHP || 1000) - dmg;
            });
        }

        function updateDisplay(hp) {
            document.getElementById("eBar").style.width = (hp / 1000) * 100 + "%";
            document.getElementById("eHPText").innerText = hp + " / 1000";
            if(hp <= 0) {
                document.getElementById("eHPText").innerText = "討伐完了！";
                setTimeout(() => hpRef.set(1000), 5000); // 5秒後に復活
            }
        }

        function log(t) {
            let l = document.getElementById("log");
            l.innerHTML = `<div>${t}</div>` + l.innerHTML;
        }
    </script>
</body>
</html>
