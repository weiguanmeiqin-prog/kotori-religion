<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐤 小鳥ゲーム</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
}
button{
  padding:10px;
  margin:5px;
  font-size:16px;
}

/* HPバー */
.bar{
  width:200px;
  height:20px;
  background:#333;
  margin:10px auto;
}
.hp{
  height:100%;
  background:lime;
}

/* ログ */
#log{
  margin-top:10px;
  color:#00ffcc;
  min-height:60px;
  max-height:150px;
  overflow-y:auto;
  text-align:left;
  padding:10px;
}
</style>
</head>

<body>

<h1>🐤 小鳥ゲーム</h1>
<h2 id="coin"></h2>
<div id="main"></div>

<script>

// ===================
// 💰 コイン
// ===================
let coin = Number(localStorage.getItem("coin") || 100);

function updateCoin(){
  document.getElementById("coin").innerText = "コイン: " + coin;
  localStorage.setItem("coin", coin);
}

// ===================
// 🐤 ガチャ
// ===================
const birds = [
 {name:"🐤 ノーマル小鳥", power:10, maxHp:100},
 {name:"🪶 スピード小鳥", power:12, maxHp:90},
 {name:"🌿 森小鳥", power:15, maxHp:120},
 {name:"🔥 炎小鳥", power:18, maxHp:110},
 {name:"💀 闇小鳥", power:20, maxHp:100},
 {name:"🌀 カオス小鳥", power:22, maxHp:95},
 {name:"👑 教祖小鳥", power:25, maxHp:130},
 {name:"✨ 神官小鳥", power:27, maxHp:120},
 {name:"🌌 宇宙小鳥", power:30, maxHp:140},
 {name:"📦 折り小鳥", power:16, maxHp:105},
 {name:"👁 観測小鳥", power:19, maxHp:100},
 {name:"⚡ バグ小鳥", power:35, maxHp:80}
];

let owned = JSON.parse(localStorage.getItem("birds") || "[]");

function gacha(){
  if(coin < 10){ alert("コイン足りない！"); return; }

  coin -= 10;

  let r = JSON.parse(JSON.stringify(
    birds[Math.floor(Math.random()*birds.length)]
  ));

  r.level = 1;
  r.exp = 0;

  owned.push(r);

  localStorage.setItem("birds", JSON.stringify(owned));
  updateCoin();

  document.getElementById("main").innerHTML =
    `<h2>${r.name} GET!!</h2>
     <p>Lv:1 攻:${r.power} HP:${r.maxHp}</p>
     <button onclick="showMenu()">戻る</button>`;
}

// ===================
// 📦 所持＋選択
// ===================
let selectedIndex = null;

function showOwned(){
  let html = "<h2>所持小鳥（クリックで選択）</h2>";

  owned.forEach((b,i)=>{
    html += `<button onclick="selectBird(${i})">
      ${b.name} Lv${b.level} (攻:${b.power} HP:${b.maxHp})
    </button><br>`;
  });

  html += "<br><button onclick='showMenu()'>戻る</button>";
  document.getElementById("main").innerHTML = html;
}

function selectBird(i){
  selectedIndex = i;
  alert("選択した！");
  showMenu();
}

// ===================
// ⚔ バトル
// ===================
let player;
let enemy;
let turnLock = false;

const enemies = [
 {name:"🌀 カオスの塊", maxHp:80, skill:"分裂"},
 {name:"💀 闇の鳥", maxHp:100, skill:"呪い"},
 {name:"👁 観測者", maxHp:90, skill:"確定ダメ"},
 {name:"🔥 暴走小鳥", maxHp:120, skill:"連撃"},
 {name:"👑 偽教祖", maxHp:150, skill:"支配"}
];

function startBattle(){

  if(selectedIndex === null){
    alert("キャラ選んで！");
    return;
  }

  player = JSON.parse(JSON.stringify(owned[selectedIndex]));
  enemy = JSON.parse(JSON.stringify(
    enemies[Math.floor(Math.random()*enemies.length)]
  ));

  player.hp = player.maxHp;
  enemy.hp = enemy.maxHp;

  drawBattle();
}

// ===================
// 描画
// ===================
function drawBattle(){

  document.getElementById("main").innerHTML = `
    <h2>${player.name} Lv${player.level}</h2>
    <div class="bar"><div id="pBar" class="hp"></div></div>
    <p id="pText"></p>

    <h2>VS</h2>

    <h2>${enemy.name}</h2>
    <div class="bar"><div id="eBar" class="hp"></div></div>
    <p id="eText"></p>

    <button onclick="attack()">攻撃</button>
    <button onclick="skill()">必殺技</button>
    <button onclick="heal()">回復</button>

    <div id="log"></div>
  `;

  updateHP();
}

// ===================
// HPだけ更新（重要）
// ===================
function updateHP(){
  let pPercent = (player.hp/player.maxHp)*100;
  let ePercent = (enemy.hp/enemy.maxHp)*100;

  document.getElementById("pBar").style.width = pPercent + "%";
  document.getElementById("eBar").style.width = ePercent + "%";

  document.getElementById("pText").innerText =
    player.hp + " / " + player.maxHp;

  document.getElementById("eText").innerText =
    enemy.hp + " / " + enemy.maxHp;
}

// ===================
// 行動
// ===================
function attack(){
  if(turnLock) return;
  turnLock = true;

  let dmg = Math.floor(Math.random()*10)+player.power;
  enemy.hp -= dmg;

  log(`🐤 攻撃！ ${dmg}ダメージ！`);
  updateHP();

  setTimeout(enemyTurn,800);
}

function skill(){
  if(turnLock) return;
  turnLock = true;

  let dmg = player.power*2;
  enemy.hp -= dmg;

  log("💥 必殺技！！");
  updateHP();

  setTimeout(enemyTurn,1000);
}

function heal(){
  if(turnLock) return;
  turnLock = true;

  let heal = Math.floor(Math.random()*20)+10;
  player.hp += heal;
  if(player.hp>player.maxHp) player.hp = player.maxHp;

  log("✨ 回復 +" + heal);
  updateHP();

  setTimeout(enemyTurn,800);
}

// ===================
// 敵ターン
// ===================
function enemyTurn(){

  if(enemy.hp <= 0){
    win();
    return;
  }

  log("💀 敵のターン…");

  setTimeout(()=>{

    let dmg = Math.floor(Math.random()*15)+5;

    if(Math.random()<0.3){
      dmg += 10;
      log("⚠ 敵スキル発動！");
    }

    player.hp -= dmg;
    log(`💀 敵攻撃！ ${dmg}ダメージ`);
    updateHP();

    if(player.hp <= 0){
      lose();
      return;
    }

    turnLock = false;

  },800);
}

// ===================
// 勝敗
// ===================
function win(){
  coin += 30;
  player.exp += 20;

  while(player.exp >= player.level*50){
  player.exp -= player.level*50; // ←余り残す
  player.level++;
  player.power += 3;
  player.maxHp += 10;

  log("🎉 レベルアップ！ Lv" + player.level);
}

  owned[selectedIndex] = player;
  localStorage.setItem("birds", JSON.stringify(owned));
  updateCoin();

  document.getElementById("main").innerHTML =
    `<h2>勝利！！</h2>
     <p>EXP+20 / コイン+30</p>
     <button onclick='showMenu()'>戻る</button>`;
}

function lose(){
  document.getElementById("main").innerHTML =
    "<h2>負けた…</h2><button onclick='showMenu()'>戻る</button>";
}

// ===================
// ログ（履歴型）
// ===================
function log(text){
  let el = document.getElementById("log");
  el.innerHTML += text + "<br>";
  el.scrollTop = el.scrollHeight;
}

// ===================
// メニュー
// ===================
function showMenu(){
  document.getElementById("main").innerHTML = `
    <button onclick="gacha()">🎰 ガチャ</button><br>
    <button onclick="startBattle()">⚔ バトル</button><br>
    <button onclick="showOwned()">📦 所持</button>
  `;
}

updateCoin();
showMenu();

</script>

</body>
</html>
