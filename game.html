<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐤 小鳥ゲーム</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
}
button{
  padding:10px;
  margin:5px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>🐤 小鳥ゲーム</h1>
<h2 id="coin"></h2>
<div id="main"></div>

<script>

// ===================
// 💰 コイン
// ===================
let coin = Number(localStorage.getItem("coin") || 100);

function updateCoin(){
  document.getElementById("coin").innerText = "コイン: " + coin;
  localStorage.setItem("coin", coin);
}

// ===================
// 🐤 ガチャ（HP付き）
// ===================
const birds = [
 {name:"🐤 ノーマル小鳥", power:10, maxHp:100},
 {name:"🪶 スピード小鳥", power:12, maxHp:90},
 {name:"🌿 森小鳥", power:15, maxHp:120},
 {name:"🔥 炎小鳥", power:18, maxHp:110},
 {name:"💀 闇小鳥", power:20, maxHp:100},
 {name:"🌀 カオス小鳥", power:22, maxHp:95},
 {name:"👑 教祖小鳥", power:25, maxHp:130},
 {name:"✨ 神官小鳥", power:27, maxHp:120},
 {name:"🌌 宇宙小鳥", power:30, maxHp:140},
 {name:"📦 折り小鳥", power:16, maxHp:105},
 {name:"👁 観測小鳥", power:19, maxHp:100},
 {name:"⚡ バグ小鳥", power:35, maxHp:80}
];

let owned = JSON.parse(localStorage.getItem("birds") || "[]");

// ガチャ
function gacha(){
  if(coin < 10){
    alert("コイン足りない！");
    return;
  }

  coin -= 10;

  let r = birds[Math.floor(Math.random()*birds.length)];
  owned.push(r);

  localStorage.setItem("birds", JSON.stringify(owned));
  updateCoin();

  document.getElementById("main").innerHTML =
    `<h2>${r.name} GET!!</h2>
     <p>攻撃: ${r.power} / HP: ${r.maxHp}</p>
     <button onclick="showMenu()">戻る</button>`;
}

// ===================
// 📦 所持
// ===================
function showOwned(){
  let html = "<h2>所持小鳥</h2>";

  if(owned.length === 0){
    html += "<p>まだいない</p>";
  }else{
    owned.forEach((b,i)=>{
      html += `<p>${i+1}. ${b.name} (攻:${b.power} HP:${b.maxHp})</p>`;
    });
  }

  html += "<button onclick='showMenu()'>戻る</button>";
  document.getElementById("main").innerHTML = html;
}

// ===================
// ⚔ バトル
// ===================
let player;
let enemy;

const enemies = [
 {name:"🌀 カオスの塊", maxHp:80, skill:"分裂"},
 {name:"💀 闇の鳥", maxHp:100, skill:"呪い"},
 {name:"👁 観測者", maxHp:90, skill:"確定ダメ"},
 {name:"🔥 暴走小鳥", maxHp:120, skill:"連撃"},
 {name:"👑 偽教祖", maxHp:150, skill:"支配"} // 中ボス
];

function startBattle(){

  if(owned.length === 0){
    alert("小鳥がいない！");
    return;
  }

  player = JSON.parse(JSON.stringify(
    owned[Math.floor(Math.random()*owned.length)]
  ));

  enemy = JSON.parse(JSON.stringify(
    enemies[Math.floor(Math.random()*enemies.length)]
  ));

  player.hp = player.maxHp;
  enemy.hp = enemy.maxHp;

  drawBattle();
}

function drawBattle(){
  document.getElementById("main").innerHTML = `
    <h2>${player.name}</h2>
    <p>HP: ${player.hp} / ${player.maxHp}</p>

    <h2>VS</h2>

    <h2>${enemy.name}</h2>
    <p>HP: ${enemy.hp} / ${enemy.maxHp}</p>
    <p>スキル: ${enemy.skill}</p>

    <button onclick="attack()">攻撃</button>
    <button onclick="skill()">必殺技</button>
    <button onclick="heal()">回復</button>
  `;
}

// 攻撃
function attack(){
  let dmg = Math.floor(Math.random()*10) + player.power;
  enemy.hp -= dmg;
  enemyTurn();
}

// 必殺技
function skill(){
  let dmg = Math.floor(Math.random()*20) + player.power*2;
  enemy.hp -= dmg;
  alert("必殺技！！💥");
  enemyTurn();
}

// 回復
function heal(){
  let heal = Math.floor(Math.random()*20) + 10;
  player.hp += heal;
  if(player.hp > player.maxHp) player.hp = player.maxHp;

  alert("回復 +" + heal);
  enemyTurn();
}

// 敵ターン
function enemyTurn(){

  if(enemy.hp <= 0){
    win();
    return;
  }

  let dmg = Math.floor(Math.random()*15)+5;

  // スキル発動
  if(Math.random() < 0.3){
    dmg += 10;
    alert(enemy.skill + " 発動！");
  }

  player.hp -= dmg;

  if(player.hp <= 0){
    lose();
    return;
  }

  drawBattle();
}

// 勝利
function win(){
  coin += 30;
  updateCoin();

  document.getElementById("main").innerHTML =
    "<h2>勝利！！🎉</h2><p>コイン+30</p><button onclick='showMenu()'>戻る</button>";
}

// 敗北
function lose(){
  document.getElementById("main").innerHTML =
    "<h2>負けた…</h2><button onclick='showMenu()'>戻る</button>";
}

// ===================
// 🏠 メニュー
// ===================
function showMenu(){
  document.getElementById("main").innerHTML = `
    <button onclick="gacha()">🎰 ガチャ (10コイン)</button><br>
    <button onclick="startBattle()">⚔ バトル</button><br>
    <button onclick="showOwned()">📦 所持一覧</button>
  `;
}

// 初期
updateCoin();
showMenu();

</script>

</body>
</html>
