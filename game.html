<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐤 小鳥教：共闘聖戦</title>
    <script src="http://192.168.1.30:3000/socket.io/socket.io.js"></script>

    <style>
        body{ background:black; color:white; text-align:center; font-family:sans-serif; margin:0; }
        #main { padding: 20px; }
        .bar{ width:200px; height:20px; background:#333; margin:10px auto; border:1px solid gold; }
        .hp{ height:100%; background:lime; transition: width 0.3s; }
        button{ padding:15px; margin:5px; font-size:18px; border-radius:30px; background:gold; color:black; border:none; font-weight:bold; }
        #log{ height:120px; overflow-y:auto; background:rgba(255,255,255,0.1); margin:10px; padding:10px; font-size:12px; color:gold; }
        .bird-effect { position: fixed; font-size: 40px; animation: fly 1s forwards; pointer-events: none; }
        @keyframes fly { from{ bottom: 0; opacity: 1; } to{ bottom: 100px; opacity: 0; } }
    </style>
</head>
<body>
    <h1>🐤 小鳥教：共闘聖戦</h1>
    <div id="main">
        <h2 id="enemy-name">敵：偽教祖</h2>
        <div class="bar"><div id="eBar" class="hp" style="background:red;"></div></div>
        <p id="eHPText"></p>
        <button onclick="attack()">聖なる突撃！！</button>
    </div>
    <div id="log"></div>

    <script>
        // VALUESTARの住所を直接指定！これでGitHubからでも繋がる！
        const socket = io("http://192.168.1.30:3000");

        let enemy = { hp: 1000, maxHp: 1000 };

        function updateHP() {
            document.getElementById("eBar").style.width = (enemy.hp / enemy.maxHp) * 100 + "%";
            document.getElementById("eHPText").innerText = enemy.hp + " / " + enemy.maxHp;
        }

        function attack() {
            let dmg = Math.floor(Math.random() * 20) + 10;
            // サーバーへ送信！
            socket.emit('send-attack', { sender: "信者", damage: dmg });
        }

        // 全員の攻撃を受信！
        socket.on('receive-attack', (data) => {
            enemy.hp -= data.damage;
            if(enemy.hp < 0) enemy.hp = 0;
            updateHP();
            
            let l = document.getElementById("log");
            l.innerHTML = `<div>🔥 ${data.sender}が${data.damage}のダメージ！</div>` + l.innerHTML;

            // 画面に小鳥を飛ばす
            let b = document.createElement("div");
            b.className = "bird-effect"; b.innerText = "🐤";
            b.style.left = Math.random() * 80 + 10 + "%";
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 1000);
        });

        updateHP();
    </script>
</body>
</html>
