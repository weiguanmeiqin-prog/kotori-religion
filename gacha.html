<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;">

<h1>🎰 小鳥ガチャ</h1>

<p id="coins"></p>

<button onclick="gacha()">ガチャを引く（10コイン）</button>

<div id="result"></div>

<script>

// ページ読み込み
window.onload = function() {
  let coins = Number(localStorage.getItem("userCoins") || 0);
  document.getElementById("coins").innerText = "コイン：" + coins;
};

// キャラ一覧（増量🔥）
const characters = [
  {name:"🐦 ノーマル小鳥", img:"HEIF画像.jpeg", rate:40},
  {name:"🐤 元気な小鳥", img:"bird_genki.png", rate:20},
  {name:"🌙 夜の小鳥", img:"bird_night.png", rate:10},
  {name:"🔥 炎の小鳥", img:"bird_fire.png", rate:8},
  {name:"❄️ 氷の小鳥", img:"bird_ice.png", rate:6},
  {name:"🌈 虹の小鳥", img:"bird_rainbow.png", rate:5},
  {name:"💀 闇の小鳥", img:"bird_dark.png", rate:4},
  {name:"👼 天使の小鳥", img:"bird_angel.png", rate:3},
  {name:"👑 教祖", img:"bird_ssr.png", rate:2},
  {name:"🌀 異界の小鳥", img:"bird_void.png", rate:1},
  {name:"💎 神話の小鳥", img:"bird_myth.png", rate:0.5},
  {name:"🌌 宇宙小鳥", img:"bird_space.png", rate:0.5}
];

// ガチャ
function gacha(){
let today = new Date().toLocaleDateString();
let lastDate = localStorage.getItem("lastDate");
let count = Number(localStorage.getItem("gachaCount") || 0);

// 日付変わったらリセット
if (lastDate !== today) {
  localStorage.setItem("lastDate", today);
  localStorage.setItem("gachaCount", 0);
  count = 0;
}

// 回数制限
if (count >= 3) {
  alert("今日はもうガチャ引けない！");
  return;
}

// 回数カウント
count++;
localStorage.setItem("gachaCount", count);
  let coins = Number(localStorage.getItem("userCoins") || 0);

  if (coins < 10) {
    alert("コインが足りない！");
    return;
  }

  coins -= 10;

  // 確率処理
  let totalRate = characters.reduce((sum, c) => sum + c.rate, 0);
  let rand = Math.random() * totalRate;

  let selected;
  for (let c of characters) {
    rand -= c.rate;
    if (rand <= 0) {
      selected = c;
      break;
    }
  }

  // コレクション保存
  let collection = JSON.parse(localStorage.getItem("collection") || "[]");
  collection.push(selected.name);
  localStorage.setItem("collection", JSON.stringify(collection));

  // 表示
  document.getElementById("result").innerHTML =
    "<h2>" + selected.name + "</h2>" +
    "<img src='" + selected.img + "' width='150'>";

  // 保存
  localStorage.setItem("userCoins", coins);

  // 表示更新
  document.getElementById("coins").innerText = "コイン：" + coins;
}

</script>

</body>
</html>
