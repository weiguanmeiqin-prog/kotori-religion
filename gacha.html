<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;">

<h1>🎰 小鳥ガチャ</h1>

<p id="coins"></p>

<button onclick="gacha()">ガチャを引く</button>

<div id="result"></div>

<script>

// コイン表示
let coins = Number(localStorage.getItem("coins") || 0);
document.getElementById("coins").innerText = "コイン：" + coins;

// ガチャ
function gacha() {
const characters = [
  {name:"🐦 ノーマル小鳥", img:"bird_normal.png", rate:50},

  {name:"🐤 元気な小鳥", img:"bird_genki.png", rate:15},
  {name:"🌙 夜の小鳥", img:"bird_night.png", rate:10},
  {name:"🍵 お茶小鳥", img:"bird_tea.png", rate:8},
  {name:"💤 ねむねむ小鳥", img:"bird_sleep.png", rate:7},
  {name:"🎮 ゲーマー小鳥", img:"bird_game.png", rate:5},

  {name:"🔥 炎の小鳥", img:"bird_fire.png", rate:2},
  {name:"🧊 氷の小鳥", img:"bird_ice.png", rate:1.5},
  {name:"⚡ 雷の小鳥", img:"bird_thunder.png", rate:1},

  {name:"👻 幽霊小鳥", img:"bird_ghost.png", rate:0.8},
  {name:"💀 闇の小鳥", img:"bird_dark.png", rate:0.5},

  {name:"👑 教祖", img:"bird_ssr.png", rate:0.2},
  {name:"🌈 神の小鳥", img:"bird_god.png", rate:0.05}
];

function gacha(){

  let coins = Number(localStorage.getItem("coins") || 0);

  if(coins < 5){
    alert("コインが足りない！");
    return;
  }

  coins -= 5;

  // 確率計算
  let total = characters.reduce((sum, c) => sum + c.rate, 0);
  let rand = Math.random() * total;

  let selected;
  for(let c of characters){
    rand -= c.rate;
    if(rand <= 0){
      selected = c;
      break;
    }
  }

  // 表示
  document.getElementById("result").innerHTML =
    "<h2>" + selected.name + "</h2>" +
    "<img src='" + selected.img + "' width='150'>";

  // 保存
  let collection = JSON.parse(localStorage.getItem("collection") || "[]");
  collection.push(selected);
  localStorage.setItem("collection", JSON.stringify(collection));

  localStorage.setItem("coins", coins);
  document.getElementById("coins").innerText = "コイン：" + coins;
}

</script>

</body>
</html>
