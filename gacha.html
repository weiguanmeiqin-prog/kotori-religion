<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;">

<h1>🎰 小鳥ガチャ</h1>

<p id="coins"></p>

<button onclick="gacha()">ガチャを引く</button>

<div id="result"></div>

<script>

// ページ読み込み時
window.onload = function() {
  let coins = Number(localStorage.getItem("coins") || 0);
  document.getElementById("coins").innerText = "コイン：" + coins;
};

// ガチャ
function gacha() {

  let coins = Number(localStorage.getItem("coins") || 0);

  if (coins < 5) {
    alert("コインが足りない！");
    return;
  }

  coins -= 5;

  let r = Math.random();
  let result = "";
  let img = "";

  if (r < 0.6) {
    result = "🐦 ノーマル小鳥";
    img = "bird_normal.png";
  } else if (r < 0.9) {
    result = "✨ レア小鳥";
    img = "bird_rare.png";
  } else {
    result = "👑 教祖";
    img = "bird_ssr.png";
  }

  document.getElementById("result").innerHTML =
    "<h2>" + result + "</h2><img src='" + img + "' width='150'>";

  localStorage.setItem("coins", coins);

  document.getElementById("coins").innerText = "コイン：" + coins;
}

</script>

</body>
</html>
