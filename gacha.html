<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小鳥ガチャ</title>
<style>
  body { background: black; color: white; text-align: center; font-family: sans-serif; }
  h1 { font-size: 2em; margin-top: 20px; }
  #coins { font-size: 1.2em; margin: 10px 0; }
  button { font-size: 1.2em; padding: 10px 20px; cursor: pointer; background: #444; color: white; border: 1px solid #666; border-radius: 5px; }
  button:hover { background: #555; }
  
  #bird-window {
    width: 230px; 
    height: 180px; 
    overflow: hidden; 
    margin: 20px auto;
    border: 4px solid #333;
    border-radius: 10px;
    display: none; 
    position: relative;
  }
  
  #bird-sprite {
    position: absolute;
    top: 0;
    left: 0;
    width: 960px; 
    height: 570px; 
  }
</style>
</head>
<body>

<h1>🎰 小鳥ガチャ</h1>

<p id="coins"></p>

<button onclick="gacha()">ガチャを引く（10コイン）</button>

<div id="bird-window">
  <img src="IMG_0263.png" id="bird-sprite" alt="小鳥">
</div>

<div id="result-name"></div>

<script>
const characters = [
  {name:"🐦 ノーマル小鳥", rate:40, col:0, row:0},
  {name:"🐥 元気な小鳥", rate:20, col:1, row:0},
  {name:"🌙 夜の小鳥", rate:10, col:2, row:0},
  {name:"🔥 炎の小鳥", rate:8, col:3, row:0},
  {name:"❄️ 氷の小鳥", rate:6, col:0, row:1},
  {name:"🌈 虹の小鳥", rate:5, col:1, row:1},
  {name:"💀 闇の小鳥", rate:4, col:2, row:1},
  {name:"👼 天使の小鳥", rate:3, col:3, row:1},
  {name:"👑 教祖", rate:2, col:0, row:2},
  {name:"🌀 異界の小鳥", rate:1, col:1, row:2},
  {name:"💎 神話の小鳥", rate:0.5, col:2, row:2},
  {name:"🌌 宇宙小鳥", rate:0.5, col:3, row:2}
];

const birdW = 240; 
const birdH = 190; 

window.onload = function() {
  let coins = Number(localStorage.getItem("userCoins") || 0);
  document.getElementById("coins").innerText = "コイン：" + coins;
};

function gacha(){
  let coins = Number(localStorage.getItem("userCoins") || 0);

  if (coins < 10) {
    alert("コインが足りない！修行（ログイン）してきなさい！");
    return;
  }

  coins -= 10;
  localStorage.setItem("userCoins", coins);
  document.getElementById("coins").innerText = "コイン：" + coins;

  let totalRate = characters.reduce((sum, c) => sum + c.rate, 0);
  let rand = Math.random() * totalRate;

  let selected;
  for (let c of characters) {
    rand -= c.rate;
    if (rand <= 0) {
      selected = c;
      break;
    }
  }

  // ★ここで図鑑（birdCollection）に保存するよ！
  let gotBirds = JSON.parse(localStorage.getItem("birdCollection") || "[]");
  if (!gotBirds.includes(selected.name)) {
    gotBirds.push(selected.name);
    localStorage.setItem("birdCollection", JSON.stringify(gotBirds));
  }

  document.getElementById("result-name").innerHTML = "<h2>" + selected.name + "</h2>";
  
  const windowEl = document.getElementById("bird-window");
  const spriteEl = document.getElementById("bird-sprite");
  
  const posX = -selected.col * birdW;
  const posY = -selected.row * birdH;
  
  spriteEl.style.left = posX + "px";
  spriteEl.style.top = posY + "px";
  windowEl.style.display = "block";
}
</script>

</body>
</html>
