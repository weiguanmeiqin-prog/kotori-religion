<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>教祖</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:serif;
}
#god{
  font-size:120px;
  animation: spin 5s linear infinite;
    @keyframes spin {
      100% { transform: rotate(360deg); }
    } /* ←これが全体の終わりを示す大事なカッコ！ */

    /* --- 巨大化アニメーション --- */
    @keyframes bless-grow {
      0% { transform: scale(1); }
      100% { transform: scale(20); }
    }

      0% { transform: scale(1); }
      100% { transform: scale(20); } /* 20倍に巨大化！ */
    }

    /* --- 高速回転アニメーション --- */
    @keyframes bless-spin {
      100% { transform: rotate(360deg); }
    }

    /* --- 点滅アニメーション --- */
    @keyframes bless-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

  
</style>

</head>
<body>

<h1>教祖</h1>

<div id="god">🕊</div>

<p>すべてを折った者</p>

<button onclick="bless()">祝福を受ける</button>

<script>
  // --- 祝福（巨大化＆乱舞）関数 ---
  function bless() {
    // 1. アラート（セリフ）を表示（これは残しておきましょう！）
    alert("オリガミノコトリッ！！");

    // 2. 教祖（🕊️）を巨大化させる
    const god = document.getElementById('god');
    // 今の回転アニメーションを止めて、巨大化＆点滅アニメーションに切り替える
    god.style.animation = 'bless-spin 0.5s linear infinite, bless-grow 2s ease-in-out forwards, bless-blink 0.3s linear infinite';
    
    // 3. 聖なる言葉（文字）を乱舞させる
    const words = ["オリガミノコトリッ！！", "祝福ッ！！", "悟りッ！！", "折れッ！！", "飛べッ！！"];
    for (let i = 0; i < 100; i++) { // 100個の文字を生成
      setTimeout(() => {
        const wordDiv = document.createElement('div');
        wordDiv.innerText = words[Math.random() * words.length | 0]; // ランダムな言葉を選択
        wordDiv.style.position = 'fixed';
        
        // ランダムな位置、サイズ、色
        wordDiv.style.top = Math.random() * 100 + 'vh';
        wordDiv.style.left = Math.random() * 100 + 'vw';
        wordDiv.style.fontSize = (Math.random() * 30 + 20) + 'px'; // 20px〜50px
        wordDiv.style.color = `hsl(${Math.random() * 360}, 100%, 50%)`; // ランダムな虹色
        
        wordDiv.style.zIndex = '9998'; // 教祖よりは下に配置
        wordDiv.style.pointerEvents = 'none'; // クリックの邪魔をしない
        wordDiv.style.transition = 'transform 1s ease-out, opacity 1s';
        
        document.body.appendChild(wordDiv);

        // アニメーション（少し動かして消す）
        setTimeout(() => {
          wordDiv.style.transform = `translate(${Math.random() * 200 - 100}px, ${Math.random() * 200 - 100}px) rotate(${Math.random() * 360}deg) scale(${Math.random() * 2 + 1})`;
          wordDiv.style.opacity = '0';
        }, 100);

        // 使い終わった要素を消す
        setTimeout(() => wordDiv.remove(), 2000); // 2秒後に消去
      }, i * 20); // 0.02秒おきに1個ずつ生成
    }

    // 4. 背景色を赤くする（これは残しておきます）
    document.body.style.backgroundColor = "red";
    
    // 5. 5秒後に元に戻す（時限装置）
    setTimeout(() => {
      god.style.animation = 'spin 5s linear infinite'; // 元のアニメーションに戻す
      document.body.style.backgroundColor = "black"; // 背景色を黒に戻す
    }, 5000); // 5秒後に実行
  }

</script>
<style>
  /* 図鑑全体のスタイル */
  .collection-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3列に並べる */
    gap: 10px;
    padding: 20px;
  }

  .bird-card {
    background: #222;
    border: 2px solid #444;
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    font-size: 12px;
  }

  /* 未入手の時は画像を暗くする */
  .locked {
    filter: brightness(0) invert(0.3); /* シルエット化 */
  }

  /* 図鑑用の小さな窓 */
  .thumb-window {
    width: 80px; 
    height: 60px;
    overflow: hidden;
    margin: 0 auto 5px;
    position: relative;
    border: 1px solid #555;
  }

  .thumb-img {
    position: absolute;
    width: 320px; /* 元の幅(960)を1/3に縮小 */
    height: 190px; /* 元の高さ(570)を1/3に縮小 */
  }
</style>

<div id="status">図鑑コンプリート率: <span id="percent">0</span>%</div>
<div class="collection-grid" id="collection-list"></div>

<script>
// 図鑑を表示する関数
function updateCollection() {
  const list = document.getElementById("collection-list");
  list.innerHTML = "";
  
  // 保存されている「入手済みリスト」を取得
  const gotBirds = JSON.parse(localStorage.getItem("birdCollection") || "[]");

  characters.forEach((bird, index) => {
    const isGot = gotBirds.includes(bird.name);
    const card = document.createElement("div");
    card.className = "bird-card";
    
    // 画像の位置計算（ガチャと同じ仕組み）
    const posX = -(bird.col * 80);
    const posY = -(bird.row * 63);

    card.innerHTML = `
      <div class="thumb-window">
        <img src="IMG_0263.png" class="thumb-img ${isGot ? '' : 'locked'}" 
             style="left:${posX}px; top:${posY}px">
      </div>
      <div>${isGot ? bird.name : "？？？"}</div>
    `;
    list.appendChild(card);
  });

  // 達成率の計算
  const percent = Math.floor((gotBirds.length / characters.length) * 100);
  document.getElementById("percent").innerText = percent;
}

// ページを開いた時に実行
updateCollection();
</script>


</body>
</html>
