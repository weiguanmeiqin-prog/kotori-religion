<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>折り紙の小鳥教</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:serif;
}
.glitch{
  animation: glitch 0.2s infinite;
}
@keyframes glitch{
  0%{transform:translate(0);}
  50%{transform:translate(3px,-3px);}
  100%{transform:translate(-3px,3px);}
}
</style>

</head>
<body>

<h1>🕊 折り紙の小鳥教</h1>
<p id="msg">接続中...</p>

<input type="password" id="pass">
<br>
<button onclick="login()">入信</button>

<script>
const messages = [
"小鳥は見ている",
"折られてはいけない",
"羽音が近い",
"すでに選ばれている"
];

setInterval(()=>{
  msg.innerText = messages[Math.floor(Math.random()*messages.length)];
},2000);

function login(){
  const p = pass.value;

  if(p === "kotori"){
    localStorage.setItem("rank","見習い小鳥");
    location.href="secret.html";
  }else{
    document.body.classList.add("glitch");
    alert("拒否された");
  }
}
</script>

</body>
</html>
