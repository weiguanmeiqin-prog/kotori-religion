<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🐤 小鳥教カオス診断</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;overflow:hidden;">

<h1>🐤 小鳥教診断</h1>

<div id="question"></div>
<div id="choices"></div>
<div id="result"></div>

<br>
<button onclick="share()">結果をシェア</button>

<script>
let step = 0;
let score = 0;
let resultObj = null;

// 🐤 質問
const questions = [
  { q:"あなたは折り紙を折りますか？", choices:["折る","折らない","燃やす"]},
  { q:"小鳥は好き？", choices:["好き","好き","好き"]},
  { q:"今ここにいますか？", choices:["はい","いいえ","🐤"]},
  { q:"この診断に意味はある？", choices:["ある","ない","どっちでもいい"]},
  { q:"最後の質問です（嘘）", choices:["終わる","終わらない","折"]},
  { q:"今、後ろに何かいる？", choices:["いる","いない","振り返る"]},
  { q:"折り紙は何回折れる？", choices:["1回","∞","すでに折られている"]},
  { q:"君は本当に君？", choices:["はい","いいえ","🐤"]},
  { q:"今の気持ちは？", choices:["🐤","🌀","🔥"]},
  { q:"この診断終わると思う？", choices:["終わる","終わらない","もう終わってる"]}
];

// 🧠 メタ発言
const metaLines = [
  "この診断、意味ある？",
  "今ちょっと飽きてるでしょ",
  "でも続けるよね？",
  "君の選択、全部見てるよ",
  "これ作った人もよく分かってない",
  "今スクショ撮ろうとしてる？",
  "もう結果でよくない？"
];

// 👑 結果＋説明
const results = [
  {
    title:"🐤 一般信者（つまらない）",
    desc:"特に何も起きません。平和です。でもそれでいいの？"
  },
  {
    title:"✨ 選ばれし小鳥",
    desc:"あなたは小鳥に選ばれました。理由はありません。"
  },
  {
    title:"🔥 異教徒（排除対象）",
    desc:"危険です。このままだと排除されます。折ってください。"
  },
  {
    title:"👁 監視されている者",
    desc:"すでに見られています。気づいてないだけです。"
  },
  {
    title:"🌀 バグ存在（存在が不安定）",
    desc:"あなたはこの世界に存在していません。"
  },
  {
    title:"💀 消滅予備軍",
    desc:"カウントダウンは始まっています。"
  },
  {
    title:"📦 折りたたまれし存在",
    desc:"あなたはすでに折られています。"
  },
  {
    title:"🎭 偽物の教祖",
    desc:"それ、本当に本物ですか？"
  },
  {
    title:"🧠 思考が折れた人",
    desc:"考えるのをやめた瞬間、完成します。"
  },
  {
    title:"🧿 見られている側",
    desc:"観測されると存在が確定します。"
  }
];

// 表示
function showQuestion(){

  if(step > 7 && Math.random() < 0.3){
    showResult();
    return;
  }

  let q = questions[Math.floor(Math.random()*questions.length)];

  document.getElementById("question").innerHTML = "<h2>" + q.q + "</h2>";

  q.choices.sort(() => Math.random() - 0.5);

  let html = "";
  q.choices.forEach(c => {
    html += "<button onclick='answer()'>" + c + "</button><br><br>";
  });

  document.getElementById("choices").innerHTML = html;
}

// 回答
function answer(){

  score += Math.floor(Math.random()*5);

  // メタ
  if(Math.random() < 0.35){
    alert(metaLines[Math.floor(Math.random()*metaLines.length)]);
  }

  // 🐤 小鳥増殖
  let b = document.createElement("div");
  b.innerText = "🐤";
  b.style.position = "fixed";
  b.style.left = Math.random()*100 + "%";
  b.style.top = Math.random()*100 + "%";
  document.body.appendChild(b);

  // 🔁 ループ
  if(Math.random() < 0.2){
    step--;
  }

  step++;
  showQuestion();
}

// 結果
function showResult(){

  resultObj = results[Math.floor(Math.random()*results.length)];

  // 👑 SSR
  if(Math.random() < 0.03){
    resultObj = {
      title:"👑 真・教祖（0.3%）",
      desc:"すべてを知っていますね。もう戻れません。"
    };
  }

  // 🌌 超SSR
  if(Math.random() < 0.01){
    resultObj = {
      title:"🌌 神を超えた小鳥",
      desc:"この診断を作った存在より上です。"
    };
  }

  document.getElementById("question").innerHTML = "";
  document.getElementById("choices").innerHTML = "";

  document.getElementById("result").innerHTML =
    "<h1 style='font-size:40px'>" + resultObj.title + "</h1>" +
    "<p style='font-size:18px'>" + resultObj.desc + "</p>";
}

// シェア
function share(){
  if(!resultObj){
    alert("まだ結果が出ていません！");
    return;
  }

  let text = "私は『" + resultObj.title + "』でした。\n" + resultObj.desc + "\n#小鳥教診断";
  let url = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text);
  window.open(url);
}

// 初期
showQuestion();

</script>

</body>
</html>
