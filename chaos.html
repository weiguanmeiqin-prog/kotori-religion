<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🐤 小鳥教カオス診断</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;overflow:hidden;">

<h1>🐤 小鳥教診断</h1>

<div id="question"></div>
<div id="choices"></div>
<div id="result"></div>

<br>
<button onclick="share()">結果をシェア</button>
<button onclick="shareLine()">LINEで送る</button>
<script>
let step = 0;
let resultObj = null;

// 🐤 タイプ
let type = {
  bird: 0,
  chaos: 0,
  dark: 0,
  god: 0,
  void: 0
};

// ❓ 質問（順番に全部出る）
const questions = [
  {
    q:"あなたは折り紙を折りますか？",
    choices:[
      {text:"折る", type:"bird"},
      {text:"折らない", type:"chaos"},
      {text:"燃やす", type:"dark"}
    ]
  },
  {
    q:"小鳥を見たらどうする？",
    choices:[
      {text:"愛でる", type:"bird"},
      {text:"観測する", type:"void"},
      {text:"崇める", type:"god"}
    ]
  },
  {
    q:"この世界は本物？",
    choices:[
      {text:"本物", type:"bird"},
      {text:"バグ", type:"chaos"},
      {text:"存在しない", type:"void"}
    ]
  },
  {
    q:"あなたは誰？",
    choices:[
      {text:"人間", type:"bird"},
      {text:"小鳥", type:"god"},
      {text:"不明", type:"void"}
    ]
  },
  {
    q:"折り紙は何回折れる？",
    choices:[
      {text:"1回", type:"bird"},
      {text:"∞", type:"chaos"},
      {text:"すでに折られている", type:"void"}
    ]
  },
  {
    q:"この診断どう思う？",
    choices:[
      {text:"楽しい", type:"bird"},
      {text:"意味不明", type:"chaos"},
      {text:"危険", type:"dark"}
    ]
  },
  {
    q:"教祖を見たら？",
    choices:[
      {text:"従う", type:"god"},
      {text:"疑う", type:"chaos"},
      {text:"逃げる", type:"dark"}
    ]
  },
  {
    q:"今の気持ちは？",
    choices:[
      {text:"🐤", type:"bird"},
      {text:"🌀", type:"chaos"},
      {text:"💀", type:"dark"}
    ]
  },
  {
    q:"あなたは観測されている？",
    choices:[
      {text:"されている", type:"void"},
      {text:"されていない", type:"bird"},
      {text:"気づいてないだけ", type:"dark"}
    ]
  },
  {
    q:"この先どうする？",
    choices:[
      {text:"進む", type:"bird"},
      {text:"戻る", type:"chaos"},
      {text:"消える", type:"void"}
    ]
  }
];

// 🧠 メタ発言
const metaLines = [
  "ここまでちゃんとやってるのえらい",
  "あとちょっとだよ",
  "飽きてない？",
  "ちゃんと選んでる？",
  "見られてるよ"
];

// 表示（順番）
function showQuestion(){

  // 👉 全部終わったら結果
  if(step >= questions.length){
    showResult();
    return;
  }

  let q = questions[step];

  document.getElementById("question").innerHTML =
    "<h2>(" + (step+1) + "/" + questions.length + ")<br>" + q.q + "</h2>";

  let html = "";

  q.choices.forEach(c => {
    html += "<button onclick=\"answer('" + c.type + "')\">" + c.text + "</button><br><br>";
  });

  document.getElementById("choices").innerHTML = html;
}

// 回答
function answer(t){

  type[t]++;

  // 🧠 たまにメタ
  if(Math.random() < 0.25){
    alert(metaLines[Math.floor(Math.random()*metaLines.length)]);
  }

  // 🐤 小鳥演出
  let b = document.createElement("div");
  b.innerText = "🐤";
  b.style.position = "fixed";
  b.style.left = Math.random()*100 + "%";
  b.style.top = Math.random()*100 + "%";
  document.body.appendChild(b);

  step++;
  showQuestion();
}

// 👑 結果
function showResult(){

  let maxType = "bird";

  if(type.chaos > type[maxType]) maxType = "chaos";
  if(type.dark > type[maxType]) maxType = "dark";
  if(type.god > type[maxType]) maxType = "god";
  if(type.void > type[maxType]) maxType = "void";

  const resultTable = {

    bird: [
      {title:"🐤 純粋な小鳥", desc:"あなたは優しくて平和な存在です。"},
      {title:"🪶 羽の使い手", desc:"飛べるかもしれません。"},
      {title:"🌿 森の小鳥", desc:"自然に愛されています。"}
    ],

    chaos: [
      {title:"🌀 カオス存在", desc:"意味はありませんが強いです。"},
      {title:"🎭 バグ人格", desc:"毎回違う自分です。"},
      {title:"🔁 無限ループ者", desc:"終わりません。"}
    ],

    dark: [
      {title:"🔥 異教徒", desc:"排除対象です。"},
      {title:"💀 闇の住人", desc:"深淵に近い存在です。"},
      {title:"🩸 危険人物", desc:"近づいてはいけません。"}
    ],

    god: [
      {title:"👑 教祖候補", desc:"導く力があります。"},
      {title:"✨ 小鳥の神官", desc:"選ばれています。"},
      {title:"🌟 光の教祖", desc:"信者が増えています。"}
    ],

    void: [
      {title:"🫥 虚無存在", desc:"あなたは存在していません。"},
      {title:"👁 観測対象", desc:"見られた瞬間に確定します。"},
      {title:"📦 折りたたまれし存在", desc:"すでに終わっています。"}
    ]

  };

  let list = resultTable[maxType];
  resultObj = list[Math.floor(Math.random()*list.length)];

  // 👑 SSR
  if(Math.random() < 0.03){
    resultObj = {
      title:"👑 真・教祖",
      desc:"すべてを知る存在です。"
    };
  }

  // 🌌 超SSR
  if(Math.random() < 0.01){
    resultObj = {
      title:"🌌 神を超えた小鳥",
      desc:"このゲームの外側にいます。"
    };
  }

  document.getElementById("question").innerHTML = "";
  document.getElementById("choices").innerHTML = "";

  document.getElementById("result").innerHTML =
    "<h1 style='font-size:40px'>" + resultObj.title + "</h1>" +
    "<p style='font-size:18px'>" + resultObj.desc + "</p>";
}

// 🔗 シェア
function share(){
  if(!resultObj){
    alert("まだ結果が出ていません！");
    return;
  }

  let text = "私は『" + resultObj.title + "』でした。\n" + resultObj.desc + "\n#小鳥教診断";
  let url = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text);
  window.open(url);
}

// 開始
showQuestion();
function shareLine(){


  if(!resultObj){
    alert("まだ結果が出ていません！");
    return;
  }

  let gameUrl = "https://weiguanmeiqin-prog.github.io/kotori-religion/chaos.html";

  let text = "私は小鳥でした\n" +
             "『" + resultObj.title + "』\n" +
             "↓やってみて";

  let url = "https://social-plugins.line.me/lineit/share?url="
            + encodeURIComponent(gameUrl)
            + "&text=" + encodeURIComponent(text);

  // ⚠️ iPhone安定版
  location.href = url;
}
</script>

</body>
</html>
