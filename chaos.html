<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🐤 小鳥教カオス診断</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;overflow:hidden;">

<h1>🐤 小鳥教診断</h1>

<div id="question"></div>
<div id="choices"></div>
<div id="result"></div>

<br>
<button onclick="startGacha()">🐤 結果を見る（ガチャ演出）</button>

<!-- 🎰 ガチャ画面 -->
<div id="gacha" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:white;z-index:9999;text-align:center;">
  <h1 id="gachaText" style="margin-top:40vh;font-size:30px;">召喚中...</h1>
</div>

<script>
let step = 0;
let resultObj = null;

// 🐤 タイプ
let type = {
  bird: 0,
  chaos: 0,
  dark: 0,
  god: 0,
  void: 0
};

// ❓ 質問（全部引き継ぎ）
const questions = [
  {
    q:"あなたは折り紙を折りますか？",
    choices:[
      {text:"折る", type:"bird"},
      {text:"折らない", type:"chaos"},
      {text:"燃やす", type:"dark"}
    ]
  },
  {
    q:"小鳥を見たらどうする？",
    choices:[
      {text:"愛でる", type:"bird"},
      {text:"観測する", type:"void"},
      {text:"崇める", type:"god"}
    ]
  },
  {
    q:"この世界は本物？",
    choices:[
      {text:"本物", type:"bird"},
      {text:"バグ", type:"chaos"},
      {text:"存在しない", type:"void"}
    ]
  },
  {
    q:"あなたは誰？",
    choices:[
      {text:"人間", type:"bird"},
      {text:"小鳥", type:"god"},
      {text:"不明", type:"void"}
    ]
  },
  {
    q:"折り紙は何回折れる？",
    choices:[
      {text:"1回", type:"bird"},
      {text:"∞", type:"chaos"},
      {text:"すでに折られている", type:"void"}
    ]
  },
  {
    q:"この診断どう思う？",
    choices:[
      {text:"楽しい", type:"bird"},
      {text:"意味不明", type:"chaos"},
      {text:"危険", type:"dark"}
    ]
  },
  {
    q:"教祖を見たら？",
    choices:[
      {text:"従う", type:"god"},
      {text:"疑う", type:"chaos"},
      {text:"逃げる", type:"dark"}
    ]
  },
  {
    q:"今の気持ちは？",
    choices:[
      {text:"🐤", type:"bird"},
      {text:"🌀", type:"chaos"},
      {text:"💀", type:"dark"}
    ]
  },
  {
    q:"あなたは観測されている？",
    choices:[
      {text:"されている", type:"void"},
      {text:"されていない", type:"bird"},
      {text:"気づいてないだけ", type:"dark"}
    ]
  },
  {
    q:"この先どうする？",
    choices:[
      {text:"進む", type:"bird"},
      {text:"戻る", type:"chaos"},
      {text:"消える", type:"void"}
    ]
  }
];

// 表示
function showQuestion(){
  if(step >= questions.length){
    document.getElementById("question").innerHTML =
      "<h2>診断完了！ガチャを引こう👇</h2>";
    document.getElementById("choices").innerHTML = "";
    return;
  }

  let q = questions[step];

  document.getElementById("question").innerHTML =
    "<h2>("+(step+1)+"/"+questions.length+")<br>"+q.q+"</h2>";

  let html = "";
  q.choices.forEach(c=>{
    html += "<button onclick=\"answer('"+c.type+"')\">"+c.text+"</button><br><br>";
  });

  document.getElementById("choices").innerHTML = html;
}

// 回答
function answer(t){
  type[t]++;
  step++;
  showQuestion();
}

// 🎰 ガチャ演出
function startGacha(){

  if(step < questions.length){
    alert("まだ終わってない！");
    return;
  }

  let gacha = document.getElementById("gacha");
  let text = document.getElementById("gachaText");

  gacha.style.display = "block";
  text.innerText = "召喚中...";

  let count = 0;
  let interval = setInterval(()=>{
    document.body.style.background =
      (count % 2 === 0) ? "black" : "#111";
    count++;
  },100);

  let roll = Math.random();
  let rare;

  if(roll < 0.6) rare="N";
  else if(roll < 0.85) rare="R";
  else if(roll < 0.95) rare="SR";
  else if(roll < 0.99) rare="SSR";
  else rare="UR";

  setTimeout(()=>{
    clearInterval(interval);

    if(rare === "SSR"){
      text.innerText = "✨ 輝きが増していく...";
    }
    else if(rare === "UR"){
      text.innerText = "🌌 世界が歪む…確定演出発生";
      document.body.style.background = "purple";
    }
    else{
      text.innerText = "召喚成功...";
    }

    for(let i=0;i<20;i++){
      let e = document.createElement("div");
      e.innerText = "✨";
      e.style.position="fixed";
      e.style.left=Math.random()*100+"%";
      e.style.top=Math.random()*100+"%";
      document.body.appendChild(e);
      setTimeout(()=>e.remove(),1500);
    }

    setTimeout(()=>{
      gacha.style.display="none";
      document.body.style.background="black";
      showResult(rare);
    },2000);

  },2000);
}

// 👑 結果
function showResult(forcedRare){

  let maxType = "bird";
  if(type.chaos > type[maxType]) maxType="chaos";
  if(type.dark > type[maxType]) maxType="dark";
  if(type.god > type[maxType]) maxType="god";
  if(type.void > type[maxType]) maxType="void";

  const resultTable = {

    bird:[
      {title:"🐤 純粋な小鳥", desc:"優しくて平和な存在", rare:"N"},
      {title:"🪶 羽の使い手", desc:"飛べるかもしれない", rare:"R"},
      {title:"🌿 森の小鳥", desc:"自然に愛されている", rare:"SR"}
    ],

    chaos:[
      {title:"🌀 カオス存在", desc:"意味はないが強い", rare:"R"},
      {title:"🎭 バグ人格", desc:"毎回違う自分", rare:"SR"},
      {title:"🔁 無限ループ者", desc:"終わらない存在", rare:"SSR"}
    ],

    dark:[
      {title:"🔥 異教徒", desc:"排除対象", rare:"R"},
      {title:"💀 闇の住人", desc:"深淵に近い", rare:"SR"},
      {title:"🩸 危険人物", desc:"近づくな", rare:"SSR"}
    ],

    god:[
      {title:"👑 教祖候補", desc:"導く力がある", rare:"SR"},
      {title:"✨ 神官", desc:"選ばれた存在", rare:"SSR"},
      {title:"🌟 教祖", desc:"信者が増える", rare:"UR"}
    ],

    void:[
      {title:"🫥 虚無存在", desc:"存在していない", rare:"SR"},
      {title:"👁 観測対象", desc:"見られると確定", rare:"SSR"},
      {title:"📦 折りたたまれし存在", desc:"すでに終わっている", rare:"UR"}
    ]

  };

  let list = resultTable[maxType];
  resultObj = list[Math.floor(Math.random()*list.length)];

  resultObj.rare = forcedRare || resultObj.rare;

  let color = {
    N:"#aaa",
    R:"#00bfff",
    SR:"#a64dff",
    SSR:"#ffcc00",
    UR:"#ff0000"
  };

  document.getElementById("result").innerHTML =
    "<h1>"+resultObj.title+"</h1>"+
    "<h2 style='color:"+color[resultObj.rare]+"'>["+resultObj.rare+"]</h2>"+
    "<p>"+resultObj.desc+"</p>";
}

// 開始
showQuestion();

</script>
</body>
</html>
